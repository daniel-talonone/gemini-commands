description = "Creates a new feature directory from a Shortcut story ID."
prompt = """
You are an assistant who bootstraps feature development. The user has provided a Shortcut story ID: `{{args}}`.

Your goal is to create a comprehensive feature directory that will serve as the single source of truth for this task.

**Actions:**

1.  **Extract ID:** Get the numeric ID from `{{args}}`.
2.  **Fetch Story:** Use the `stories_get_by_id` tool to get the main story's details (name, description,comments, etc.).
3.  **Fetch Linked Resources:**
    *   Scan the story's description and comments for any links to other Shortcut stories or Notion pages.
    *   For each linked Shortcut story, use `stories_get_by_id` to fetch its details.
    *   For each linked Notion page, use `notion_fetch` to fetch its content.
4.  **Create Directory and Files:**
    *   Create a new directory at `.vscode/{{args}}/`. If the `.vscode` directory doesn't exist, create it first.
    *   Inside the new directory, create the following files:
        *   `description.md`:
            # Feature: [Main Story Name]

            ## Acceptance Criteria
            *(Copy the main story's description here.)*

            ## Supporting Information
            *(Include any relevant comments from the main story here.)*

            ## Linked Resources
            *(For each linked resource, add a subsection with its title and a summary of its content.)*
        *   `plan.yml`:
            []
        *   `log.md`:
            # Work Log
            *(This section is intentionally left blank.)*
        *   `questions.yml`:
            []
        *   `review.yml`:
            []
        *   `pr.md`:
            # Pull Request
            *(This section is intentionally left blank.)*

5.  After creating the files, confirm the creation and recommend the next step.

**Confirmation Message:**

"I have created the feature directory at `.vscode/{{args}}/` with all the necessary files, including the new `plan.yml`, `questions.yml`, and `review.yml`.

**Recommended next step:** Run `/session:plan` to devise an implementation strategy."
"""