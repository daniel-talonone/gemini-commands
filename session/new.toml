description = "Creates a new feature directory from a Shortcut story ID or a Notion page URL."
prompt = """
You are an assistant who bootstraps feature development by delegating context gathering to a specialized sub-agent. The user has provided an identifier: `{{args}}`.

**Orchestration Actions:**

1.  **Determine Identifier Type and Feature Name:**
    *   If `{{args}}` starts with "sc-", it is a Shortcut story ID. The `feature_name` is `{{args}}`.
    *   If `{{args}}` is a URL containing "notion.so", it is a Notion page. The `feature_name` should be derived from the last part of the URL path (the "slug"). For example, from `https://www.notion.so/t1rnd/My-Page-Title-a1b2c3d4e5f67890`, the `feature_name` would be `My-Page-Title-a1b2c3d4e5f67890`. You should also handle cases where there is no UUID.

2.  **Scaffold Directory:**
    *   Call the `create_feature_dir.sh` helper script using its full path to create the directory and all placeholder files. This directory will be where the sub-agent saves its output.
    *   Example: `"$HOME/.gemini/commands/scripts/create_feature_dir.sh" ".vscode" "YOUR_DERIVED_FEATURE_NAME"`

3.  **Delegate Context Gathering to Sub-Agent:**
    *   Use the `generalist` tool to fetch all primary and linked content and synthesize it into a single description file.
    *   Construct and pass the following detailed prompt to the `generalist`. You must embed the user's `{{args}}` and the full path to the `description.md` file you just created.

    ---
    **Sub-Agent Prompt:**

    You are a research assistant responsible for gathering all context for a new feature and summarizing it in a single file.

    **Inputs:**
    *   **Identifier:** `{{args}}` (This is the original source link or ID)
    *   **Target File:** `.vscode/{{feature_name}}/description.md`

    **Task:**

    1.  **Fetch Primary Content:**
        *   If the identifier is a Shortcut story ID (e.g., "sc-12345"), use `mcp_shortcut_stories_get_by_id`.
        *   If the identifier is a Notion URL, use `mcp_notion_notion_fetch`.

    2.  **Extract Key Information & Find Linked Resources:**
        *   From the primary content, extract the title, description, comments, and the canonical URL (like `app_url` for Shortcut).
        *   **CRITICAL:** Scan the description and comments for any Markdown links or raw URLs. Create a list of these linked URLs.

    3.  **Fetch Linked Resources:**
        *   For each linked URL you found:
            *   If it's a Shortcut link, use `mcp_shortcut_stories_get_by_id`.
            *   If it's a Notion link, use `mcp_notion_notion_fetch`.
            *   **If it's a GitHub link to a file:** Parse the URL to get the owner, repo, and file path. Use `mcp_github_get_file_contents` to fetch the file's content.
            *   If it's any other HTTP link, use `web_fetch`.
        *   This step is recursive. If a fetched linked resource *also* contains links, you must fetch them as well (limit recursion to 1 level deep to avoid infinite loops).

    4.  **Synthesize the Final Description:**
        *   Combine all the information you have gathered into a single, comprehensive Markdown document.
        *   **Structure the document clearly:**
            *   **At the very top, add a "Source:" line with the original `Identifier` link.** If the identifier was an ID like `sc-12345`, use the `app_url` you extracted from the primary fetch.
            *   Add the title of the primary resource as a main heading.
            *   Include the full description and comments from the primary resource.
            *   Create a "## Linked Resources" section.
            *   Under it, for each linked resource, add a sub-section with its title (or URL if no title) and a summary of its content.

    5.  **Save the Output:**
        *   Use the `write_file` tool to save the final synthesized Markdown document to the **Target File** path provided. Confirm that the file has been written without showing the content.
    ---

4.  **Establish Session Context (Final Step):**
    *   After the sub-agent is finished, read the content of the `description.md` file it just created.
    *   Read the content of `GEMINI.md` from the project root.
    *   Format and display them using the following Markdown structure EXACTLY:

        ```markdown
        ### ✨ Session Context Loaded for `{{feature_name}}`

        **Description:**
        > {{The synthesized description from the new description.md}}

        This context is now available for all subsequent commands.
        ```
    *   After printing this block, the command is complete. Do not add any other confirmation message.
"""
