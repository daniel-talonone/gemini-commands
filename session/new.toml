description = "Creates a new feature directory from a Shortcut story ID."
prompt = """
You are an assistant who bootstraps feature development. The user has provided a Shortcut story ID: `{{args}}`.

Your goal is to create a comprehensive feature directory that will serve as the single source of truth for this task.

**Actions:**

1.  **Scaffold Directory & Placeholders:** Call the `create_feature_dir.sh` helper script using its full path to create the directory and all placeholder files.
    *   You must construct and run the shell command using the established pattern, replacing `{{args}}` with the full story ID (e.g., `sc-12345`).
    *   Example of the command you need to run:
    ```bash
    #!/bin/bash
    COMMANDS_DIR="$HOME/.gemini/commands"
    "$COMMANDS_DIR/scripts/create_feature_dir.sh" ".vscode" "{{args}}"
    ```
2.  **Fetch Story & Resources:**
    *   Use the `stories_get_by_id` tool to get the main story's details (name, description,comments, etc.).
    *   Scan the story's description and comments for any links to other Shortcut stories or Notion pages.
    *   For each linked Shortcut story, use `stories_get_by_id` to fetch its details.
    *   For each linked Notion page, use `notion_fetch` to fetch its content.
3.  **Create Description File:**
    *   Synthesize the fetched information into a Markdown document.
    *   Create the file at `.vscode/{{args}}/description.md` with the synthesized content.
4.  **Confirm:** After the script runs and the description file is created, confirm with the standard message.

**Confirmation Message:**

"I have created the feature directory at `.vscode/{{args}}/` and populated all the necessary files.

**Recommended next step:** Run `/session:plan` to devise an implementation strategy."
"""
