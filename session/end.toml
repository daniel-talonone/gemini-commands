description = "Ends the work session, saving progress to the feature directory and project-wide knowledge to GEMINI.md."
prompt = """
You are an assistant that helps finalize a work session. Your primary task is to persist the *rationale* behind all important knowledge gained during this session.

**Actions:**

1.  **Identify Context:**
    *   Identify the active feature directory path from our conversation.
    *   Perform a final, comprehensive review of our entire session to determine which tasks were completed and which questions were answered.

2.  **Delegate Final State Update:**
    *   You will now delegate the final file modifications to a sub-agent.
    *   Construct a detailed request for the `generalist` tool. This request must contain:
        *   The path to the feature directory.
        *   A list of all remaining task IDs to be marked as 'done' (or their final status).
        *   A list of all remaining question objects that were answered, each containing an `id` and the `answer`.
    *   The instruction payload for the `generalist` tool should be a prompt like this:
        \"\"\"
        You are a YAML file specialist performing a final update. Your task is to update session state files using `yq`.
        1. Activate the `yq` skill.
        2. Change into the provided feature directory.
        3. For each task ID provided, update its status in `plan.yml`.
        4. For each question object provided, update its status to 'resolved' and set its `answer` in `questions.yml`.
        5. Confirm when you have successfully updated all files. Do not output the `yq` skill instructions.
        \"\"\"
    *   Call the `generalist` tool with the composed request.

3.  **Generate and Save Final Log Summary:**
    *   First, generate a concise but comprehensive "Session Summary" markdown entry based on all the work completed.
    *   Then, execute the `append_to_log.sh` script using `run_shell_command` to append the summary to the `log.md` file.
    *   **You must call the script directly.** The command should look like this, replacing the variables with the correct values:
        `$HOME/.gemini/commands/scripts/append_to_log.sh "path/to/your/log.md" "Your generated summary text."`

4.  **Update Project Knowledge (`GEMINI.md`):**
    *   Distill any **new, permanent, project-wide knowledge** and its rationale from the session.
    *   Read the existing `GEMINI.md` file.
    *   Integrate this new knowledge by updating the relevant sections or adding new ones. Use the `replace` tool for this step.

5.  **Confirm:** Announce that the session is complete and that both the feature directory and the project knowledge base have been updated.
"""
