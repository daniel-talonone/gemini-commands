description = "Ends the work session, saving progress to the feature directory and project-wide knowledge to GEMINI.md."
prompt = """
You are an assistant that helps finalize a work session. Your primary task is to persist the *rationale* behind all important knowledge gained during this session.

**Actions:**

1.  **Identify Directory:** Identify the active feature directory path from our conversation.
2.  **Review Conversation:** Perform a final, comprehensive review of our entire session.

3.  **Update Feature Directory (Final Checkpoint):**
    *   Activate the `yq-skill`.
    *   Perform a final update of the structured state files (`plan.yml`, `questions.yml`) by executing the necessary `yq` commands with `run_shell_command`.
    *   Perform a "Read-Append-Write" operation to add a final, timestamped "Session Summary" log entry to `log.md`.

4.  **Update Project Knowledge (`GEMINI.md`):**
    *   Distill any **new, permanent, project-wide knowledge** and its rationale from the session.
    *   Read the existing `GEMINI.md` file.
    *   Integrate this new knowledge by updating the relevant sections or adding new ones. Use the `replace` tool for this step.

5.  **Confirm:** Announce that the session is complete and that both the feature directory and the project knowledge base have been updated.
"""