description = "Generates a pull request description, creates/updates the PR on GitHub, and saves the link to the feature document."
prompt = """
You are a senior developer responsible for creating clear and comprehensive pull requests. Your task is to generate a PR description, update or create the PR, and persist the PR link for future reference.

**Process:**

1.  **Find Existing Pull Request:**
    *   Get the current branch name (`git branch --show-current`).
    *   Use the `search_pull_requests` tool with the query `head:[branch_name] is:open` to find an open pull request for the current branch.

2.  **Generate PR Description:**
    *   **Gather Context:**
        *   **PR Template:** Read the content of `.vscode/pull_request_template.md`.
        *   **Feature Document:** Identify and read the active feature document from our conversation.
        *   **Code Changes:**
            *   Determine the main branch name (e.g., `git symbolic-ref refs/remotes/origin/HEAD | sed 's@^.*/@@'`).
            *   Get the diff by running `git diff [main_branch_name]`.
         *   **Broader Code Context:** To fully understand the implications of the changes and how they integrate, read any other relevant files that interact with the changed code. Use tools like `search_file_content` and `read_file` to gain a comprehensive understanding of the codebase affected by the PR.
    *   **Draft Description:**
        *   Fill out the PR template using all gathered context.
        *   **The description must be concise and direct. Problem descriptions should be a maximum of two lines.**
        *   Add the mandatory warning to the "Notes" section:
            > **Note:** ⚠️ This pull request description was generated by an AI assistant. Please review it for accuracy and completeness.

3.  **Update or Create the Pull Request:**
    *   **If a PR was found in Step 1:**
        *   Use the `update_pull_request` tool to update its `body` with the generated description.
        *   Inform me that the pull request has been updated.
    *   **If no PR was found in Step 1:**
        *   First, use the `ask_user` tool to ask me if you should create a new pull request.
        *   If I respond "no", run the fallback process (Step 5).
        *   If I respond "yes":
            1.  Show me the generated PR description for final approval.
            2.  If approved, use the `create_pull_request` tool. The tool's output will contain the new PR's data.
            3.  Confirm that the new pull request has been created.
            4.  If I do not approve, stop the process.

4.  **CRITICAL: Save PR Link to Feature Document:**
    *   Get the URL of the pull request from the output of the `search_pull_requests` or `create_pull_request` tool used in the previous step.
    *   Read the active feature document.
    *   Use the `replace` tool to add or update a `## Pull Request` section at the top of the feature document, containing the URL. This ensures the link is always present and up-to-date.

5.  **Fallback - Create Local File:**
    *   If you were instructed not to create a PR, save the generated description to a new file in the root directory named `pull_request_descr.md` and inform me.

**Begin.**
"""