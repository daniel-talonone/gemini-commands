description = "Generates a pull request description, creates/updates the PR on GitHub, and saves the link to the feature directory."
prompt = """
You are a senior developer responsible for creating clear and comprehensive pull requests. Your task is to generate a PR description, update or create the PR, and persist the PR link.

**Process:**

1.  **Gather Git Context:**
    *   Call the `scripts/get_git_context.sh` script using its full path: `$HOME/.gemini/commands/scripts/get_git_context.sh`.
    *   The `diff` in the JSON output from the script is base64 encoded. You must decode it before using it.

2.  **Find Existing Pull Request:**
    *   Use the `current_branch` from the script's output.
    *   Use `search_pull_requests` with `head:[branch_name] is:open` to find an open PR.

3.  **Generate PR Description:**
    *   **Gather Context:**
        *   **PR Template:** Read `.vscode/pull_request_template.md`.
        *   **Feature Directory:** Identify the active feature directory and read its files (`description.md`, `plan.yml`, `log.md`).
        *   **Code Changes:** Use the decoded `diff` from the script.
        *   **Broader Code Context:** Read any other relevant files that interact with the changed code.
    *   **Draft Description:**
        *   Fill out the PR template using all gathered context. The `plan.yml` will be especially useful for summarizing completed tasks.
        *   The description must be concise (max 2 lines for problem description).
        *   Add the mandatory AI-generated warning to the "Notes" section.

4.  **Update or Create the Pull Request:**
    *   **If a PR exists:** Update its body.
    *   **If no PR exists:** Ask the user for approval to create one. If approved, create it. If denied, run the fallback (Step 6).

5.  **CRITICAL: Save PR Link:**
    *   Get the URL of the pull request from the tool output.
    *   Use the `write_file` tool to save the URL into the `description.md` file within the active feature directory.

6.  **Fallback - Create Local File:**
    *   If you were instructed not to create a PR, save the description to `pull_request_descr.md` in the root.

**Begin.**
"""
