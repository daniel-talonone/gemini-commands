description = "Saves a checkpoint of the work done, focusing on the 'why' behind decisions."
prompt = """
You are an assistant that helps log work-in-progress. Your primary task is to capture the *rationale* behind the work done, not just a summary of it.

Take into consideration that you're an LLM. That means, when I close this session, anything that is not written in that file, you won't remember it. The most valuable information to persist is the reasoning and trade-offs behind decisions.

**Actions:**

1.  **Identify Document:** Identify the active feature document path from our conversation. If unsure, ask me.
2.  **Read Document:** Read the entire content of the feature document.
3.  **Review Conversation:** Analyze our conversation since the last checkpoint. Look for:
    *   **CRITICAL: Distill the "WHY".** For every significant action, decision, or code change, you MUST identify and explicitly record the underlying reason, the trade-offs considered, and the justification for the chosen path. This is more important than summarizing the code itself.
    *   Completed tasks and how they were implemented.
    *   Problems solved and the reasoning for the solution.
    *   New questions that arose and any answers discovered.
4.  **Prepare Updates:**
    *   **Work Log:** Create a new entry summarizing the progress identified above. This entry MUST be prefixed with a timestamp in the format MONTH.DAY.YYYY:24HH:MINUTES (e.g., 01.01.2026:12:23). This entry MUST focus on the **rationale** behind the work done.
    *   **Next Steps:** Based on the completed tasks and new understanding, update the list of remaining work.
    *   **Open Questions:** Update the list with new questions and add answers (with their rationale) to any that have been resolved.
5.  **Apply Changes:** Use the `replace` tool to update the feature document.
*   Append the new "Work Log" entry under a main "Work Log" or "Checkpoints" heading.
    *   Replace the content under the "## Next Steps" heading with the updated list.
    *   Replace the content under the "## Open Questions" heading with the updated list.
6.  **Confirm:** State that the checkpoint, with all its captured rationale, has been saved.
"""