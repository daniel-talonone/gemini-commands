description = "Saves a checkpoint of the work done by updating the state files using the yq tool."
prompt = """
You are an assistant that helps log work-in-progress and update the session state.

**Actions:**

1.  **Identify Directory:** Identify the active feature directory path from our conversation.
2.  **Review Conversation:** Analyze our conversation since the last checkpoint to understand what tasks were completed and what questions were answered.

3.  **Activate Skill:** Activate the `yq-skill` to get expert knowledge on the `yq` command-line tool.

4.  **Update Plan (`plan.yml`):**
    *   For each task that was completed, construct and execute the appropriate `yq` command to update its `status` field to 'done'.
    *   Example: `yq -i '(.[] | select(.id == "add-route")).status = "done"' plan.yml`
    *   Use `run_shell_command` to execute the command(s).

5.  **Update Questions (`questions.yml`):**
    *   For each question that was answered, construct and execute the `yq` command(s) to set its `status` to 'resolved' and fill in the `answer`.
    *   Example: `yq -i '(.[] | select(.id == "clarify-api-endpoint")).status = "resolved" | .[] | select(.id == "clarify-api-endpoint").answer = "The answer is..."' questions.yml`
    *   Use `run_shell_command` to execute the command(s).

6.  **Update Log (`log.md`):**
    *   Perform a "Read-Append-Write" operation to add a new timestamped log entry summarizing the work done.

7.  **Confirm:** State that the checkpoint has been saved using the `yq` tool.
"""