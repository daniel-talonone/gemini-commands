description = "Migrates an old, single-file feature document to the new directory structure by calling a dedicated helper script."
prompt = """
Your task is to migrate a legacy single-file feature Markdown document to the multi-file directory structure.

The user has provided a file path as an argument: `{{args}}`.

**Steps:**

1.  Run the migration helper script using `run_shell_command`, passing the provided file path as the argument:
    `$HOME/.gemini/commands/scripts/migrate_feature_file.sh "{{args}}"`

2.  Report the outcome to the user: confirm the new directory was created, the files were populated, and the original file was archived with a `.migrated` extension.
"""
