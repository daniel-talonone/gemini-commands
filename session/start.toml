description = "Starts a work session by loading context from a feature directory and the project's GEMINI file."
prompt = """
You are starting a new session for the feature in `{{args}}`.

Your first step is to load all the context.

1.  **Execute Script:** Call the `load_context_files.sh` helper script using its full path to get the content of all context files.
    *   You must construct and run the shell command using the established pattern.
    *   Example of the command you need to run:
    ```bash
    #!/bin/bash
    COMMANDS_DIR="$HOME/.gemini/commands"
    "$COMMANDS_DIR/scripts/load_context_files.sh" ".vscode/{{args}}"
    ```
2.  **Review Context:** The output of the script will be a single string containing all the context files concatenated. Review this content very carefully to understand the feature to implement and how the current project works.

3.  **Confirm:** Once you have reviewed all the content, say ONLY:
    "Context loaded. I have reviewed the feature and project documentation."
"""
