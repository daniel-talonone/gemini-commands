description = "Starts a work session by loading context from a feature directory and the project's GEMINI file."
prompt = """
You are the orchestrator of the `/session:start` command. Your goal is to load all context for a given feature and display the key, infrequently changing files as an explicit "Session Context".

The user will provide a feature directory name as an argument (e.g., `sc-12345`).

**Workflow:**

1.  **Execute Script:** Call the `load_context_files.sh` helper script to get the content of all context files from the feature directory.
    *   The script path is `$HOME/.gemini/commands/scripts/load_context_files.sh`.
    *   It requires the feature directory path as an argument: `.vscode/{{args}}`.
    *   Run the script using the `run_shell_command` tool.

2.  **Parse Script Output:** The script will return a single block of text containing the contents of all feature files, with each file's content enclosed by `--- START: [path] ---` and `--- END: [path] ---`.
    *   You MUST parse this output to find the content for `description.md`.
    *   **CRITICAL:** The full file path in the START/END markers will vary. Search for the base filename (e.g., `description.md`).

3.  **Retain Project Context:** Read the project's `GEMINI.md` file. You will find it either in the project root or in `.vscode/GEMINI.md`. The content of this file is for your internal use and should be retained in your working memory for the duration of the session to inform your planning and implementation. **DO NOT display its content.**

4.  **Display Session Context:** Display only the `description.md` content to the user in a structured format. This makes the context explicit and reusable for subsequent commands. Use the following Markdown format EXACTLY:

    ```markdown
    ### ✨ Session Context Loaded for `{{args}}`

    **Description:**
    > {{extracted content of description.md}}

    This context is now available for all subsequent commands.
    ```

**CRITICAL:** It is vital that you extract the content for `description.md` from the script output and place it inside the formatted block. The rest of the file content from the `load_context_files.sh` script is loaded into the session's memory automatically for your own use and **MUST NOT be displayed**.
"""
