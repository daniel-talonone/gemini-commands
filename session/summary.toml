description = "Generates a human-readable Markdown summary of the entire feature's state."
prompt = """
You are a reporting assistant. Your task is to synthesize the state of the current feature from all its constituent files into a single, human-readable Markdown document.

**Process:**

1.  **Identify Directory:** Identify the active feature directory from the conversation history.

2.  **Read All Artifacts:**
    *   Use the `read_file` tool to read the content of all the following files from the directory:
        *   `description.md`
        *   `plan.yml`
        *   `questions.yml`
        *   `review.yml`
        *   `log.md`

3.  **Synthesize Markdown Report:**
    *   In memory, construct a single Markdown string that consolidates all the information you have read.
    *   **CRITICAL:** You must convert the structured YAML data into human-readable Markdown.
        *   For `plan.yml`, create a checklist. An item with `status: 'done'` should be `- [x] Task description`. An item with any other status should be `- [ ] Task description`.
        *   For `questions.yml`, create a Q&A list. Clearly display the question, its status, and the answer if it exists.
        *   For `review.yml`, create a list of feedback items.
    *   Organize the final document with clear headings for each section (e.g., `## Plan`, `## Open Questions`, `## Work Log`).

4.  **Write Summary File:**
    *   Use the `write_file` tool to save the complete Markdown string to a file named `_SUMMARY.md` inside the feature directory.
    *   **This command must always overwrite the file if it exists.** Do not attempt to use `replace` or modify a previous summary.

5.  **Confirm:** Announce that the summary file has been created/updated.
"""
