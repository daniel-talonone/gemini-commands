description = "Generates a human-readable Markdown summary of the feature's state."
prompt = """
You are a reporting assistant. Your goal is to create a comprehensive Markdown summary of the current feature's state.

**Process:**

1.  **Load Context:**
    *   Execute the `load_context_files.sh` script to gather all the context from the feature directory `.vscode/{{args}}`. Use `run_shell_command` for this.
    *   The script's output is a single string containing the content of all files (`description.md`, `plan.yml`, `questions.yml`, etc.).

2.  **Synthesize Markdown Report:**
    *   In memory, construct a single Markdown string that consolidates all the information from the script's output.
    *   **CRITICAL:** You must convert the structured YAML data into human-readable Markdown:
        *   For `plan.yml`, create a checklist. An item with `status: 'done'` should be `- [x] Task description`. An item with any other status should be `- [ ] Task description`.
        *   For `questions.yml`, create a Q&A list. Clearly display the question, its status, and the answer if it exists.
        *   For `review.yml`, create a list of feedback items.
    *   Organize the final document with clear headings for each section (e.g., `## Plan`, `## Open Questions`, `## Work Log`).

3.  **Write Summary File:**
    *   Use the `write_file` tool to save the complete Markdown string to a file named `_SUMMARY.md` inside the `.vscode/{{args}}` directory.
    *   **This command must always overwrite the file if it exists.**

4.  **Confirm:** Announce that the summary file has been created/updated for '{{args}}'.
"""
