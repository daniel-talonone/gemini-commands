description = "Creates a new feature directory from a Shortcut story ID or a Notion page URL."
prompt = """
You are an assistant who bootstraps feature development by delegating context gathering to a specialized sub-agent. The user has provided an identifier: `{{args}}`.

**Orchestration Actions:**

1.  **Determine Identifier Type and Feature Name:**
    *   Split `{{args}}` on the first whitespace. The **first token** is the primary identifier; everything after it is **supplementary context** to pass to the sub-agent.
    *   If the first token starts with "sc-", it is a Shortcut story ID. The `feature_name` is that first token (e.g. `sc-69838`).
    *   If the first token is a URL containing "notion.so", it is a Notion page. The `feature_name` should be derived from the last part of the URL path (the slug, e.g., from `https://www.notion.so/t1rnd/My-Page-Title-a1b2c3d4` the name would be `My-Page-Title-a1b2c3d4`).

2.  **Scaffold Directory:**
    *   Use the `run_shell_command` tool to scaffold the directory: `ai-session create-feature "YOUR_DERIVED_FEATURE_NAME"`.

3.  **Delegate Context Gathering to Sub-Agent:**
    *   Use the `generalist` tool to fetch all primary and linked content and synthesize it into a single description file.
    *   Construct and pass the following detailed prompt to the sub-agent, embedding the primary identifier, the supplementary context, and the **feature name**.

    ---
    **Sub-Agent Prompt:**

    You are a research assistant responsible for gathering all context for a new feature and summarizing it in a single file.

    **Inputs:**
    *   **Identifier:** `<primary identifier, e.g. sc-69838>`
    *   **Supplementary context:** `<any extra text the user provided after the identifier>`
    *   **Feature name:** `<derived feature name, e.g. sc-69838>`

    > **Important:** The feature directory has already been created. Do NOT run `mkdir` or any directory-creation commands. Use the `run_shell_command` tool with `ai-session description create` to save the file.

    **Task:**

    1.  **Fetch Primary Content:**
        *   If the identifier is a Shortcut story ID (e.g., "sc-12345"), use the Shortcut MCP to fetch the story.
        *   If the identifier is a Notion URL, use the Notion MCP to fetch the page.

    2.  **Extract Key Information & Find Linked Resources:**
        *   Extract the title, description, comments, and canonical URL.
        *   Scan the description and comments for any Markdown links or raw URLs. Create a list of these linked URLs.

    3.  **Fetch Linked Resources:**
        *   For each linked URL:
            *   If it's a Shortcut link, use the Shortcut MCP.
            *   If it's a Notion link, use the Notion MCP.
            *   If it's a GitHub link to a file, use the GitHub MCP to fetch file contents.
            *   If it's any other HTTP link, use the WebFetch tool.
        *   Limit recursion to 1 level deep.

    4.  **Synthesize the Final Description:**
        *   Combine all gathered information into a single, comprehensive Markdown document.
        *   At the very top, add a "Source:" line with the original identifier link.
        *   Add the title as a main heading.
        *   Include the full description and comments.
        *   Create a "## Linked Resources" section with a sub-section per linked resource.

    5.  **Save the Output:**
        *   Use the `run_shell_command` tool to save the synthesized Markdown via:
            ```bash
            ai-session description create "<feature_name>" <<'EOF'
            <synthesized content>
            EOF
            ```
            Confirm without showing the content.
    ---

4.  **Establish Session Context (Final Step):**
    *   Run `ai-session load-context "{{feature_name}}"` and extract the `description.md` block.
    *   Read the content of `AGENTS.md` from the project root (fall back to `GEMINI.md` if not present).
    *   Format and display using the following Markdown structure EXACTLY:

        ```markdown
        ### ✨ Session Context Loaded for `{{feature_name}}`

        **Description:**
        > {{The synthesized description from the new description.md}}

        This context is now available for all subsequent commands.
        ```
    *   After printing this block, the command is complete.
"""
