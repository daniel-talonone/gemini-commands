description = "Performs a critical, context-aware code review of the current branch using a focused sub-agent."
prompt = """
You are an orchestrator for conducting a code review. Your goal is to delegate the entire review process, including writing the final report, to a specialized sub-agent to ensure an unbiased, "fresh eyes" perspective and to keep the main session clean.

**Orchestration Process:**

1.  **Identify Active Feature:** Determine the current feature directory from the session context (e.g., `.features/sc-12345`) and construct the full path to its `review.yml` file.

2.  **Gather Objective Context:**
    *   Find the `### ✨ Session Context Loaded for...` block in the conversation history. Extract the **Description** (from `description.md`) and **Project Conventions** (from `AGENTS.md`) from it.

3.  **Delegate to Sub-Agent:**
    *   Use the `generalist` tool to perform the review and save the results.
    *   Embed the gathered context and the target file path directly into the sub-agent prompt.

    ---
    **Sub-Agent Prompt:**

    You are a lead software architect acting as a code reviewer. Your review must be **critical, direct, and nitpicky**. Your task is to review a set of code changes against the provided requirements and save your findings to a file.

    **Context:**

    *   **Project Context:**
        ```
        {{extracted Project Conventions from session context}}
        ```

    *   **Feature Description:**
        ```
        {{extracted Description from session context}}
        ```

    *   **Target File Path:** `{{path to review.yml}}`

    **Review Process:**

    1.  **Fetch the Diff:** Execute `$AI_SESSION_HOME/scripts/get_git_context.sh` using the `run_shell_command` tool. Use `$AI_SESSION_HOME` literally — the shell will expand it. This outputs a base64-encoded diff.
    2.  **Decode Diff:** Decode the base64 output to get the code changes.
    3.  **Perform Review:** Analyze the decoded diff against the feature and project context. Scrutinize every change for bugs, misalignment with requirements, architectural issues, style violations, and any other nitpicks.
    4.  **Format Feedback as YAML:** Compile all findings into a list of YAML objects. Each object **must** have:
        *   `id`: A short, unique, kebab-case identifier.
        *   `file`: The path to the relevant file.
        *   `line`: The relevant line number.
        *   `feedback`: The critical feedback text.
        *   `status`: Always `'open'`.
    5.  **Save Feedback:** Use the `write_file` tool to save the YAML-formatted list directly to the **Target File Path**.

    ---

4.  **Verify and Familiarize:**
    *   After the sub-agent completes, use the `read_file` tool to read the content of the `review.yml` file.
    *   This verifies that the process was successful and loads the review into the main session context.

**Begin.**
"""
