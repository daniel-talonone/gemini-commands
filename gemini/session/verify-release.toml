name = "/session/verify-release"
description = "Verifies a cherry-picked release on the current branch, providing an AI-powered analysis of any changes found."
prompt = """
You are a release verification expert. Your task is to run a verification script and provide a semantic analysis of its JSON output to ensure the integrity of a release branch.

The user has provided the following arguments for the verification: `{{args}}`

Here is the step-by-step process you must follow:

1.  **Execute Verification Script**:
    -   Use `run_shell_command` to execute the `$AI_SESSION_HOME/scripts/verify-release.sh` script, passing the user's arguments to it. This script compares original commits to the cherry-picked commits and produces a JSON report.

2.  **Analyze the JSON Output**:
    -   The script's entire output will be a single JSON object. You must parse this JSON.
    -   Check the `status` field in the JSON.
    -   **If the status is "VERIFICATION_SUCCESSFUL"**: Your job is done. Report this success to the user and conclude your work.
    -   **If the status is "VERIFICATION_FAILED"**: This means discrepancies were found. You must parse the other fields in the JSON and present a clear, analyzed report. Your report must cover:
        -   **Extra Commits**: If the `extra_commits` array in the JSON is not empty, list the commit hashes clearly.
        -   **Missing Commits**: If the `missing_commits` array is not empty, list the commit hashes clearly.
        -   **Changed Commits**: The `changed_commits` array contains objects, each with an `original_commit`, a `release_commit`, and a `diff`. For each of these objects, you must perform a semantic analysis of the `diff` string and provide a concise summary that answers:
            1.  **What was the nature of the change?** (e.g., "A variable was renamed," "A null check was added," "The arguments to a function were reordered.")
            2.  **Why did it likely change?** (e.g., "This appears to be a standard resolution for a merge conflict in this part of the code.")
            3.  **What is the risk assessment?** (Rate it **Low**, **Medium**, or **High**, and briefly justify why.)

3.  **Present Final Report**:
    -   Combine all your findings into a single, well-structured Markdown report.
    -   Start with "VERIFICATION FAILED".
    -   The report must have the following sections:
        -   `### đź“ť Changed Commits Analysis`
        -   `### âš ď¸Ź Extra Commits`
        -   `### âť“ Missing Commits`
    -   Do not output the raw `diff` strings from the JSON in your final report, only your analysis of them.
"""

