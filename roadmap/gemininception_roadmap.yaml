- command: "/session:address-feedback"
  priority: "Medium"
  status: "Missing"
  reason_for_subagent: "The sub-task of 'Document Rationale' (Step 5) could benefit from delegation to a sub-agent. This would align with Core Benefit 2 (Output Simplification & Encapsulation) and Use Case 3 (Content Generation from Specific Inputs). The main agent could focus on the interactive feedback loop, while the sub-agent handles the details of formatting the summary and appending it to log.md."
  details: |
    **Current Implementation:**
    The command currently orchestrates a complex, interactive loop for addressing GitHub PR comments. Step 5 involves the main agent generating a summary and calling `scripts/append_to_log.sh`.

    **Justification for Sub-task Delegation:**
    - **Pros:** Isolates the Markdown formatting and script execution from the main agent's prompt, making the main agent's loop logic cleaner. Ensures consistency in logging rationale.
    - **Cons:** Introduces an additional sub-agent call for a relatively simple logging task, potentially adding minimal overhead. However, the benefits of cleaner prompt logic and consistency outweigh this.

    **Proposed Change:**
    Modify Step 5 to delegate the "Document Rationale" task to a `generalist` sub-agent. The main agent would synthesize the feedback, plan, and rationale, then pass this structured input to the sub-agent. The sub-agent would be responsible for generating the final Markdown for the log and calling `append_to_log.sh`.

- command: "/session:define"
  priority: "Medium"
  status: "Missing"
  reason_for_subagent: "The core command needs to remain interactive, but two sub-tasks are strong candidates for sub-agent delegation: 'Perform Codebase Analysis' (Step 3) and 'Create Artifacts' (Step 5). This aligns with Core Benefits 1 (Input Sanitization) and 2 (Output Simplification & Encapsulation)."
  details: |
    **Current Implementation:**
    The command is a highly interactive LLM Orchestrator, guiding the user through story definition.

    **Justification for Sub-task Delegation:**
    - **Step 3 (Codebase Analysis):**
        - **Pros:** `glob` and `grep_search` can produce large, raw outputs. A sub-agent can process these, filter noise, and return concise, relevant technical notes, thereby sanitizing the input for the main agent. This would improve focus and efficiency for the main conversational agent.
        - **Cons:** Adds an additional tool call.
    - **Step 5 (Create Artifacts):**
        - **Pros:** Encapsulating the `create_feature_dir.sh` script call and the initial `write_file` operations makes the orchestrator's logic cleaner and ensures these procedural steps are handled robustly by a specialized sub-agent.
        - **Cons:** Minimal.

    **Proposed Change:**
    - Modify Step 3 to delegate the codebase analysis (running `glob`/`grep_search` and summarizing findings) to a `generalist` sub-agent. The sub-agent would return the "Technical Notes" content.
    - Modify Step 5 to delegate the creation of the feature directory and the initial `description.md` file (calling `create_feature_dir.sh` and `write_file`) to a `generalist` sub-agent.

