- command: "/session:plan"
  priority: "High"
  status: "Missing"
  reason_for_subagent: "The core task of generating a detailed implementation plan and clarifying questions (Steps 4 & 5) based on feature requirements and codebase analysis is highly analytical and generative. Delegating this to a sub-agent would significantly simplify the main orchestrator's prompt by offloading complex decision-making and structured output generation. It supports Core Benefit 2 (Output Simplification & Encapsulation) and 3 (Perspective Shifting)."
  details: |
    **Current Implementation:**
    The main agent performs all steps, including gathering context, analyzing the codebase, generating the YAML plan and questions, and saving them.

    **Justification for Sub-task Delegation:**
    - **Pros:**
        - Encapsulates the complex logic of converting high-level requirements and codebase insights into structured YAML plans and questions.
        - Allows the sub-agent to adopt a specific persona (e.g., 'meticulous TDD expert') for higher quality output.
        - Reduces the size and complexity of the main orchestrator's prompt.
    - **Cons:**
        - The sub-agent's prompt would need to be very detailed to guide the plan/question generation effectively.
        - Passing the raw codebase analysis results to the sub-agent might still contribute to its context size, though its output to the main agent would be concise.

    **Proposed Change:**
    Modify the command so that the main agent performs Steps 1-3 (identifying directory, gathering context, performing codebase analysis). It then passes the gathered feature description, project conventions, and codebase analysis summary to a `generalist` sub-agent. The sub-agent would be responsible for Steps 4 and 5 (generating the `plan.yml` and `questions.yml` content) and returning them to the main agent, which would then perform Step 6 (saving the files).

- command: "/session:start"
  priority: "High"
  status: "Missing"
  reason_for_subagent: "The parsing and formatting of the output from the `load_context_files.sh` script (Steps 2 & 3) are mechanical tasks that can be delegated to a sub-agent. This aligns with Core Benefit 2 (Output Simplification & Encapsulation) and 1 (Input Sanitization), as the sub-agent can process the large, raw script output and return a clean, formatted session context block."
  details: |
    **Current Implementation:**
    The main agent executes `load_context_files.sh` and then directly parses its output to construct the 'Session Context' block.

    **Justification for Sub-task Delegation:**
    - **Pros:**
        - Encapsulates the logic for parsing a potentially large script output and formatting it into a specific Markdown structure.
        - Simplifies the main orchestrator's prompt, making it more focused on initiating the context loading process rather than its details.
        - Improves robustness by having a dedicated sub-agent handle parsing.
    - **Cons:**
        - Introduces a sub-agent call.

    **Proposed Change:**
    Modify the command so that the main agent performs Step 1 (executing `load_context_files.sh`). It then passes the raw script output to a `generalist` sub-agent. The sub-agent would be responsible for Steps 2 and 3 (parsing the output, extracting `description.md` and `GEMINI.md`, and formatting the final 'Session Context Loaded for...' block) and returning this formatted string to the main agent, which would then display it.

