- id: create-prompt
  description: Create the headless prompt for executing a slice
    tasks:
      - id: create-execute-slice-prompt
        task: Create the `headless/session/execute_slice.md` file with the necessary instructions and placeholders.
        details: |
          - The file should be based on `headless/session/execute_task.md`.
          - It must instruct the LLM to loop through tasks in a slice.
          - It must include placeholders: `{{story_description_here}}`, `{{architecture_description_here}}`, `{{slice_description_here}}`, `{{tasks_here}}`, `{{changes_so_far_here}}`, `{{verification_command_here}}`, `{{feature_dir_here}}`, and a conditional `{{error_message_here}}` block.
          - It must instruct the agent to run `ai-session update-task` after each task completion.
          - It must instruct the agent to run the verification command after each file edit.
        status: todo
