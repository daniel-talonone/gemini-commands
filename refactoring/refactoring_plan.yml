description: >
  To improve the reliability and determinism of the session commands by migrating procedural, deterministic logic out of LLM prompts and into dedicated, executable helper scripts. The LLM's role shifts from *performing* the procedure to *calling* the script that performs the procedure.

high_priority:
  - command: /session:migration
    script: scripts/migrate_feature_file.sh
    status: done
    description: >
      The prompt contains a complex, multi-step procedure for reading an old markdown file, parsing it section by section, creating a new directory, creating multiple new files, converting content to YAML, and renaming the old file. This is extremely brittle for an LLM to perform directly. The script would accept the path to the old markdown file as an argument and handle the entire migration process internally. The LLM's only role would be to call this single script.

  - command: /session:define
    script: scripts/create_feature_dir.sh
    status: done
    description: >
      The prompt instructs the LLM to generate a directory name, create a directory, and then create multiple placeholder files (`plan.yml`, `log.md`, etc.). The LLM's role should be focused on the conversation to define the feature. Once approved, it should generate the directory name and call the `create_feature_dir.sh` script. The LLM's final step would be a single `write_file` call to create `description.md` with the synthesized content.

medium_priority:
  - command:
      - /session:start
      - /session:summary
    script: scripts/load_context_files.sh
    status: done
    description: >
      Both commands begin by reading all 5-6 files from the feature directory, one by one. This is inefficient and results in multiple tool calls. The script would take the feature directory path as an argument, read all the context files, and print their contents to standard output, perhaps separated by a delimiter. The LLM could then get all context in a single, efficient tool call.

  - command: /session:address-feedback
    script: scripts/append_to_log.sh
    status: done
    description: >
      The prompt uses a "Read-Append-Write" pattern to log the rationale for a fix to `log.md`. The LLM should generate the summary of the feedback and the rationale, then call the script to append it to the log.

low_priority:
  - command:
      - /session:pr
      - /session:pr_from_branch
      - /session:review
      - /session:review_from_branch
    script: scripts/get_git_context.sh
    status: done
    description: >
      These prompts all involve running multiple `git` commands to get context (current branch name, main branch name, diff against main). A single script could reliably gather all necessary git context and return it as a structured string (e.g., JSON), which the LLM can then use for generating the PR description or performing the code review.
    future_consideration: >
      For debugging or handling extremely large diffs, it might be beneficial to store the script's JSON output in a file (e.g., `git_context.json`) instead of consuming it from stdout. This creates a persistent artifact but introduces the risk of using stale data.
